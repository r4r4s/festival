<section class="home-page" [attr.aria-label]="'home.ariaLabel' | t" data-testid="home-page">
  <article class="home-page__card" data-testid="home-hero-card">
    <img
      class="home-page__image"
      ngSrc="/assets/images/backgrounds/home-hero-sunset-beach-1200.webp"
      ngSrcset="800w, 1200w, 1600w"
      [loaderParams]="{ variants: true }"
      sizes="(min-width: 1320px) 1200px, calc(100vw - 40px)"
      width="1200"
      height="798"
      priority
      alt=""
    />

    <div class="home-page__overlay" aria-hidden="true"></div>

    <div class="home-page__content">
      <div class="home-page__copy">
        <h1 class="home-page__title" data-testid="home-hero-title">
          {{ 'home.hero.title' | t }}
        </h1>

        <p class="home-page__description" data-testid="home-hero-description">
          {{ 'home.hero.description' | t }}
        </p>

        <div class="home-page__actions" data-testid="home-hero-actions">
          <button class="home-page__button home-page__button--primary" type="button">
            <span class="home-page__button-icon" aria-hidden="true">
              <svg lucideCalendar focusable="false" size="22" strokeWidth="2"></svg>
            </span>
            <span class="home-page__button-label">{{ 'home.hero.primaryCta' | t }}</span>
            <span class="home-page__button-arrow" aria-hidden="true">
              <svg lucideArrowRight focusable="false" size="22" strokeWidth="2"></svg>
            </span>
          </button>

          <button class="home-page__button home-page__button--secondary" type="button">
            <span class="home-page__button-icon" aria-hidden="true">
              <svg lucideCalendar focusable="false" size="22" strokeWidth="2"></svg>
            </span>
            <span class="home-page__button-label">{{ 'home.hero.secondaryCta' | t }}</span>
            <span class="home-page__button-arrow" aria-hidden="true">
              <svg lucideArrowRight focusable="false" size="22" strokeWidth="2"></svg>
            </span>
          </button>
        </div>
      </div>
    </div>
  </article>

  @defer (on viewport) {
    <fv-festival-calendar />
  } @placeholder {
    <div class="home-page__festivals-placeholder" aria-hidden="true"></div>
  }

  @defer (on viewport) {
    <fv-featured-festivals />
  } @placeholder {
    <div class="home-page__festivals-placeholder" aria-hidden="true"></div>
  }

  @defer (on viewport) {
    <fv-home-festival-map [locations]="festivalLocations" />
  } @placeholder {
    <div class="home-page__festivals-placeholder" aria-hidden="true"></div>
  }
</section>
