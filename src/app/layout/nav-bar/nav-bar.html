<header class="nav-bar">
  <div class="nav-bar__inner">
    <a class="nav-bar__brand" routerLink="/" [attr.aria-label]="'nav.home' | t">
      @if (isDark()) {
        <img
          class="nav-bar__brand-img"
          ngSrc="assets/branding/festi-val-logo-dark.webp"
          width="746"
          height="334"
          priority
          alt="festiVAL"
        />
      } @else {
        <img
          class="nav-bar__brand-img"
          ngSrc="assets/branding/festi-val-logo.webp"
          width="746"
          height="334"
          priority
          alt="festiVAL"
        />
      }
    </a>

    <nav class="nav-bar__nav" [attr.aria-label]="'nav.aria.primary' | t">
      <ul class="nav-bar__nav-list">
        <li>
          <a
            class="nav-bar__nav-link"
            data-testid="nav-link-inicio"
            routerLink="/"
            routerLinkActive="nav-bar__nav-link--active"
            [routerLinkActiveOptions]="{ exact: true }"
            #rlaHome="routerLinkActive"
            [attr.aria-current]="rlaHome.isActive ? 'page' : null"
          >
            {{ 'nav.home' | t }}
          </a>
        </li>
        <li>
          <a
            class="nav-bar__nav-link"
            data-testid="nav-link-festivales"
            routerLink="/festivales"
            routerLinkActive="nav-bar__nav-link--active"
            #rlaFestivales="routerLinkActive"
            [attr.aria-current]="rlaFestivales.isActive ? 'page' : null"
          >
            {{ 'nav.festivals' | t }}
          </a>
        </li>
        <li>
          <a
            class="nav-bar__nav-link"
            data-testid="nav-link-calendario"
            routerLink="/calendario"
            routerLinkActive="nav-bar__nav-link--active"
            #rlaCalendario="routerLinkActive"
            [attr.aria-current]="rlaCalendario.isActive ? 'page' : null"
          >
            {{ 'nav.calendar' | t }}
          </a>
        </li>
      </ul>
    </nav>

    <div class="nav-bar__actions">
      <button
        class="nav-bar__icon-btn nav-bar__search"
        data-testid="nav-btn-buscar"
        type="button"
        [attr.aria-label]="'nav.search' | t"
      >
        <svg lucideSearch aria-hidden="true" focusable="false" size="20" strokeWidth="2"></svg>
      </button>

      <button
        class="nav-bar__icon-btn nav-bar__theme-toggle"
        data-testid="nav-btn-tema"
        type="button"
        [attr.aria-label]="themeLabelKey() | t"
        [attr.aria-pressed]="isDark()"
        (click)="toggleTheme()"
      >
        @if (isDark()) {
          <svg lucideMoon aria-hidden="true" focusable="false" size="20" strokeWidth="2"></svg>
        } @else {
          <svg lucideSun aria-hidden="true" focusable="false" size="20" strokeWidth="2"></svg>
        }
      </button>

      <button
        class="nav-bar__icon-btn nav-bar__menu"
        data-testid="nav-btn-menu"
        type="button"
        [attr.aria-label]="'nav.menu' | t"
      >
        <svg lucideMenu aria-hidden="true" focusable="false" size="22" strokeWidth="2"></svg>
      </button>
    </div>
  </div>
</header>
